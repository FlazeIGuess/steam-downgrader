name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .NET helper (self-contained win-x64)
        run: dotnet publish steam-helper/steam-helper.csproj -c Release -r win-x64 --self-contained true -o dist/steam-helper

      - name: Build Tauri app
        run: npm run tauri build

      - name: Collect installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/installer | Out-Null
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Copy-Item -Destination dist/installer
          Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Copy-Item -Destination dist/installer
          Get-ChildItem dist/installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-downgrader-windows-installer
          path: dist/installer/*
          if-no-files-found: error

      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-helper-win-x64
          path: dist/steam-helper/*
          if-no-files-found: error

      - name: Zip helper for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path dist/steam-helper/* -DestinationPath dist/steam-helper-win-x64.zip

      - name: Publish release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/*
            dist/steam-helper-win-x64.zip
          fail_on_unmatched_files: true
