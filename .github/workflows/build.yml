name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      # Signs the updater artifacts. The private key is a repo secret; the key was
      # generated without a password, so the password is empty.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Single self-contained exe, bundled into the app via bundle.resources in
      # tauri.conf.json. Must run before the Tauri build so the resource exists.
      - name: Build .NET helper (single-file, self-contained win-x64)
        run: dotnet publish steam-helper/steam-helper.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o steam-helper/publish

      # --- Non-tag: plain build check + upload artifacts ---
      - name: Build Tauri app
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build

      - name: Upload app bundles
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: steam-downgrader-windows
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Upload helper (standalone, also bundled inside the installer)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: steam-helper-win-x64
          path: steam-helper/publish/steam-helper.exe
          if-no-files-found: error

      # --- Tag: signed release with installer, updater artifacts, and latest.json ---
      - name: Extract changelog for this tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $body = @()
          $capture = $false
          foreach ($line in Get-Content CHANGELOG.md) {
            if ($line -match "^##\s+$([regex]::Escape($tag))\b") { $capture = $true; continue }
            elseif ($capture -and $line -match "^##\s+") { break }
            elseif ($capture) { $body += $line }
          }
          $text = ($body -join "`n").Trim()
          if (-not $text) { $text = "See the assets below." }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<CHANGELOG_EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $text
          Add-Content -Path $env:GITHUB_OUTPUT -Value "CHANGELOG_EOF"

      - name: Build and publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
